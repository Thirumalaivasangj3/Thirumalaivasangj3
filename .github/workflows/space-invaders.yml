name: 🎮 Space Invaders – Contribution Game

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Generate Space Invaders SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🎮 Generate Space Invaders Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-space-invaders.svg?color_snake=4F46E5&color_dots=#0D1117,#161B22,#818CF8,#6366F1,#4F46E5
            dist/github-contribution-grid-space-invaders-dark.svg?color_snake=818CF8&color_dots=#0D1117,#0D1B2A,#1e3a5f,#4F46E5,#818CF8&palette=github-dark

      - name: 📤 Push Output to `output` Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
